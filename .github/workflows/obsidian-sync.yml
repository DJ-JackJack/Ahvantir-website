name: Obsidian Sync

on:
  schedule:
    - cron: '0 2 * * 1'   # Sunday 9 PM EST / 6 PM PST (Monday 02:00 UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: [self-hosted, Windows, X64]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Obsidian converter
        shell: powershell -ExecutionPolicy Bypass -NoProfile -NonInteractive -Command "& '{0}'"
        run: |
          & python scripts/obsidian-to-md.py 2>&1 | Tee-Object -FilePath sync.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        env:
          OBSIDIAN_VAULT_PATH: ${{ secrets.OBSIDIAN_VAULT_PATH }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit articles and write sync log
        if: github.event.inputs.dry_run != 'true'
        shell: powershell -ExecutionPolicy Bypass -NoProfile -NonInteractive -Command "& '{0}'"
        run: |
          git config user.name "Ahvantir Sync Bot"
          git config user.email "actions@github.com"

          git add src/articles/
          $articleDiff = git diff --staged --name-status -- src/articles/

          $stats = (Get-Content sync.log -ErrorAction SilentlyContinue |
                    Where-Object { $_ -match "^(Updated|Would update)" } |
                    Select-Object -Last 1)
          if (-not $stats) { $stats = "Sync did not run — OBSIDIAN_VAULT_PATH may not be configured." }

          $date     = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd')
          $datetime = (Get-Date).ToUniversalTime().ToString('yyyy-MM-dd HH:mm UTC')
          $logPath  = "sync-logs/$date.md"
          New-Item -ItemType Directory -Force -Path sync-logs | Out-Null

          $logLines = [System.Collections.Generic.List[string]]::new()
          $logLines.Add("# Ahvantir Vault Sync — $datetime")
          $logLines.Add("")
          $logLines.Add("**Run:** [Actions #$env:GITHUB_RUN_NUMBER]($env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID)")
          $logLines.Add("")
          $logLines.Add("## Summary")
          $logLines.Add("")
          $logLines.Add($stats)
          $logLines.Add("")

          if ($articleDiff) {
            $logLines.Add("## Article Changes")
            $logLines.Add("")
            foreach ($line in ($articleDiff -split "`n")) {
              $t = $line.Trim()
              if     ($t -match '^A\t') { $logLines.Add("- **Added:**   ``" + ($t -replace '^A\t.*/','') + "``") }
              elseif ($t -match '^M\t') { $logLines.Add("- **Updated:** ``" + ($t -replace '^M\t.*/','') + "``") }
              elseif ($t -match '^D\t') { $logLines.Add("- **Removed:** ``" + ($t -replace '^D\t.*/','') + "``") }
            }
            $logLines.Add("")
          } else {
            $logLines.Add("_No article files changed this run._")
            $logLines.Add("")
          }

          $logLines.Add("## Full Converter Log")
          $logLines.Add("")
          $logLines.Add('```')
          $logContent = Get-Content sync.log -ErrorAction SilentlyContinue
          if ($logContent) { foreach ($l in $logContent) { $logLines.Add($l) } }
          else              { $logLines.Add("(log unavailable)") }
          $logLines.Add('```')

          $logLines | Out-File -FilePath $logPath -Encoding utf8

          git add sync-logs/
          $staged = git diff --staged --quiet; $hasChanges = $LASTEXITCODE -ne 0
          if ($hasChanges) {
            if ($articleDiff) {
              git commit -m "chore: sync $date"
            } else {
              git commit -m "chore: sync $date [skip ci]"
            }
            git push
          } else {
            Write-Host "Nothing to commit."
          }

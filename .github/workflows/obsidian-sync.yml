name: Obsidian Sync

on:
  schedule:
    - cron: '0 2 * * 1'   # Sunday 9 PM EST / 6 PM PST (Monday 02:00 UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Obsidian converter
        run: python scripts/obsidian-to-md.py 2>&1 | tee sync.log
        env:
          OBSIDIAN_VAULT_PATH: ${{ secrets.OBSIDIAN_VAULT_PATH }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit articles and write sync log
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "Ahvantir Sync Bot"
          git config user.email "actions@github.com"

          # Stage article changes first so we can inspect the diff for the log
          git add src/articles/
          ARTICLE_DIFF=$(git diff --staged --name-status -- src/articles/)

          # Stats line from converter output
          STATS=$(grep -E "^(Updated|Would update)" sync.log 2>/dev/null | tail -1 \
                  || echo "Sync did not run — OBSIDIAN_VAULT_PATH may not be configured.")

          # Write the dated markdown log file
          mkdir -p sync-logs
          LOG_PATH="sync-logs/$(date -u '+%Y-%m-%d').md"
          {
            echo "# Ahvantir Vault Sync — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "**Run:** [Actions #${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo ""
            echo "## Summary"
            echo ""
            echo "${STATS}"
            echo ""

            if [ -n "${ARTICLE_DIFF}" ]; then
              echo "## Article Changes"
              echo ""
              echo "${ARTICLE_DIFF}" \
                | sed \
                    -e 's|^A\t.*/\(.*\)|- **Added:**   `\1`|' \
                    -e 's|^M\t.*/\(.*\)|- **Updated:** `\1`|' \
                    -e 's|^D\t.*/\(.*\)|- **Removed:** `\1`|'
              echo ""
            else
              echo "_No article files changed this run._"
              echo ""
            fi

            echo "## Full Converter Log"
            echo ""
            echo '```'
            cat sync.log 2>/dev/null || echo "(log unavailable)"
            echo '```'
          } > "${LOG_PATH}"

          # Stage log alongside articles and commit everything in one shot
          git add sync-logs/
          git diff --staged --quiet \
            || git commit -m "chore: sync $(date -u '+%Y-%m-%d') [skip ci]"
          git push

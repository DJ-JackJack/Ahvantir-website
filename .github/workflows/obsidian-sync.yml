name: Obsidian Sync

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday at 4am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit)'
        required: false
        default: 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Obsidian converter
        run: python scripts/obsidian-to-md.py
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Commit converted articles
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "Ahvantir Sync Bot"
          git config user.email "actions@github.com"
          git add src/articles/
          git diff --staged --quiet || git commit -m "chore: sync articles from Obsidian vault [skip ci]"
          git push
